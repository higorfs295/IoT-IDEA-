<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>IoT Console — Gestão &amp; Segurança · Seminário G6</title>
  <meta name="description" content="Console de gestão da fechadura inteligente CAM-G6 — demonstração de Segurança em IoT (Seminário G6 · UFG).">
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" href="assets/favicon.svg">
</head>
<body>
  <div class="console" id="console">

    <!-- ===================== SIDEBAR ===================== -->
    <aside class="sidebar" id="sidebar">
      <div class="sb-brand">
        <div class="sb-logo">IoT</div>
        <div class="t"><b>IoT Console</b><span>Gestão &amp; Segurança · G6</span></div>
      </div>
      <nav class="sb-nav" id="sbnav"><!-- preenchido por app.js --></nav>
      <div class="sb-foot">
        <div class="sb-status" data-ref="sbmode"><span class="dot"></span><span class="txt">modo <b>demo</b></span></div>
        <div class="sb-status" data-ref="sbtls"><span class="dot off"></span><span class="txt">canal <b>HTTP</b></span></div>
      </div>
    </aside>

    <!-- ===================== MAIN ===================== -->
    <div class="main">
      <header class="topbar">
        <button class="tb-btn tb-menu" data-ref="menu" aria-label="menu">
          <svg class="icon" viewBox="0 0 24 24"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </button>
        <button class="tb-btn" data-ref="collapse" aria-label="recolher menu" title="Recolher menu">
          <svg class="icon" viewBox="0 0 24 24"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="15" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </button>

        <div class="tb-title">
          <span class="crumb" data-ref="crumb">Operação</span>
          <h1 data-ref="ttl">Visão geral</h1>
        </div>

        <div class="tb-spacer"></div>

        <label class="tb-search">
          <svg class="icon sm" viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.6" y2="16.6"/></svg>
          <input placeholder="Buscar dispositivo, evento…" data-ref="search">
          <kbd>/</kbd>
        </label>

        <span class="chip neutral" data-ref="envpill"><span class="dot"></span> demo · simulação</span>

        <button class="tb-btn" data-ref="theme" aria-label="tema"></button>

        <div style="position:relative">
          <button class="tb-btn" data-ref="bell" aria-label="alertas">
            <svg class="icon" viewBox="0 0 24 24"><path d="M18 8a6 6 0 1 0-12 0c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.7 21a2 2 0 0 1-3.4 0"/></svg>
            <span data-ref="bellnum" style="position:absolute;top:-4px;right:-4px;min-width:18px;height:18px;border-radius:18px;background:var(--bad);color:#fff;font-size:10px;font-weight:800;display:none;place-items:center;padding:0 4px">0</span>
          </button>
        </div>

        <div style="position:relative">
          <button class="btn primary" data-ref="quick" data-menu-trigger>
            <svg class="icon sm" viewBox="0 0 24 24"><path d="M13 2L4 14h7l-1 8 9-12h-7z"/></svg>
            <span class="nowrap">Simular</span>
          </button>
          <div class="menu" data-ref="quickmenu" style="right:0;top:46px">
            <div class="mh">Ações da demonstração</div>
            <div class="mi" data-qa="inject"><svg class="icon sm" viewBox="0 0 24 24"><path d="M13 2L4 14h7l-1 8 9-12h-7z"/></svg> Injetar comando MQTT</div>
            <div class="mi" data-qa="brute"><svg class="icon sm" viewBox="0 0 24 24"><circle cx="8" cy="8" r="4"/><path d="M11 11l9 9M17 17l2-2M14 14l2-2"/></svg> Simular brute force</div>
            <div class="mi" data-qa="tls"><svg class="icon sm" viewBox="0 0 24 24"><path d="M12 3l8 3v5c0 5-3.5 8.5-8 10-4.5-1.5-8-5-8-10V6z"/><path d="M9 12l2 2 4-4"/></svg> Aplicar/retirar TLS</div>
            <div class="msep"></div>
            <div class="mi" data-qa="login"><svg class="icon sm" viewBox="0 0 24 24"><rect x="4" y="10" width="16" height="11" rx="2"/><path d="M8 10V7a4 4 0 0 1 8 0v3"/></svg> Abrir tela de login</div>
          </div>
        </div>

        <div style="position:relative">
          <button class="avatar" data-ref="avatar" data-menu-trigger>AD</button>
          <div class="menu" data-ref="avatarmenu" style="right:0;top:46px">
            <div class="mh">admin@cam-g6</div>
            <div class="mi" data-av="config"><svg class="icon sm" viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19 12a7 7 0 0 0-.1-1l2-1.6-2-3.4-2.3 1a7 7 0 0 0-1.7-1L14.5 2h-4l-.4 2.4a7 7 0 0 0-1.7 1l-2.3-1-2 3.4L4.1 9a7 7 0 0 0 0 2l-2 1.6 2 3.4 2.3-1a7 7 0 0 0 1.7 1l.4 2.4h4l.4-2.4a7 7 0 0 0 1.7-1l2.3 1 2-3.4-2-1.6c.1-.3.1-.7.1-1z"/></svg> Configurações</div>
            <div class="mi" data-av="theme"><svg class="icon sm" viewBox="0 0 24 24"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"/></svg> Alternar tema</div>
            <div class="msep"></div>
            <div class="mi" data-av="logout"><svg class="icon sm" viewBox="0 0 24 24"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><path d="M10 17l5-5-5-5"/><path d="M15 12H3"/></svg> Sair</div>
          </div>
        </div>
      </header>

      <div class="content" id="outlet"><!-- views renderizadas pelo router --></div>
    </div>
  </div>

  <script src="js/config.js"></script>
  <script src="js/store.js"></script>
  <script src="js/charts.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/fleet.js"></script>
  <script src="js/router.js"></script>
  <script src="js/views.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
