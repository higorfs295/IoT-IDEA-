<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Câmera IoT — Resultado do acesso</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" href="assets/favicon.svg">
</head>
<body class="resultpage">
  <div class="card rbox">
    <div class="rc" id="rc">?</div>
    <h1 id="rtitle">—</h1>
    <p id="rmsg" class="muted">—</p>
    <div class="row" style="justify-content:center;gap:10px">
      <a href="index.html" class="btn primary">Ir para o console</a>
      <a href="login.html" class="btn ghost">Nova tentativa</a>
    </div>
  </div>
  <script>
    (function () {
      var p = new URLSearchParams(location.search);
      var ok = p.get('r') === 'ok';
      document.getElementById('rc').className = 'rc ' + (ok ? 'ok' : 'no');
      document.getElementById('rc').textContent = ok ? '✓' : '✕';
      var t = document.getElementById('rtitle');
      t.textContent = ok ? 'ACESSO LIBERADO' : 'ACESSO NEGADO';
      t.style.color = ok ? '#37c088' : '#f0806c';
      document.getElementById('rmsg').textContent = ok
        ? 'Bem-vindo, admin. Porta destrancada.'
        : 'Senha incorreta.';
    })();
  </script>
</body>
</html>
